server.port=8080
spring.application.name=ridgeway-6am

# ── API Configuration (supports Anthropic direct OR OpenRouter) ──────────────
# Base URL: use https://api.anthropic.com for direct, or https://openrouter.ai/api for OpenRouter
anthropic.base.url=${ANTHROPIC_Base_URL:}

# Auth token: for OpenRouter use ANTHROPIC_AUTH_TOKEN, for direct use ANTHROPIC_API_KEY
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.auth.token=${ANTHROPIC_Auth_token:}

# Model: e.g. claude-sonnet-4-20250514 (direct) or anthropic/claude-3.5-haiku (OpenRouter)
anthropic.model=${ANTHROPIC_Model:}

# Async / SSE timeout
spring.mvc.async.request-timeout=120000
